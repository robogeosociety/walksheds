<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Walksheds — Transit Walkshed Navigator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="See what's a 15-minute walk from every Seattle Link Light Rail station." />
    <!-- Open Graph / Twitter — rich link unfurling (Slack, iMessage, Discord, etc.).
         GitHub Pages serves this 404.html for every deep-linked path / query-param
         URL (e.g. /seattle/1/50?pois=…). Crawlers don't run JS and don't follow the
         SPA redirect below, so the card metadata must live here too — not just in
         index.html — for previews to unfurl on any link rooted at walksheds.xyz,
         not only the bare base URL. Absolute URLs are required for og:image. The
         card is generated by data/icons/fetch_og_card.py from Westlake's real
         walkshed. Keep these tags in sync with index.html. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Walksheds" />
    <meta property="og:title" content="Walksheds — Seattle Link Light Rail walkshed explorer" />
    <meta property="og:description" content="See what's a 15-minute walk from every Seattle Link Light Rail station." />
    <meta property="og:url" content="https://walksheds.xyz/" />
    <meta property="og:image" content="https://walksheds.xyz/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Westlake Station's 5-, 10-, and 15-minute walksheds on the Walksheds map." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Walksheds — Seattle Link Light Rail walkshed explorer" />
    <meta name="twitter:description" content="See what's a 15-minute walk from every Seattle Link Light Rail station." />
    <meta name="twitter:image" content="https://walksheds.xyz/og-image.png" />
    <meta name="twitter:image:alt" content="Westlake Station's 5-, 10-, and 15-minute walksheds on the Walksheds map." />
    <script>
      // GitHub Pages SPA fallback — preserve path for deep linking.
      var path = window.location.pathname;
      var search = window.location.search;
      window.location.replace(
        '/?p=' + encodeURIComponent(path) +
        (search ? '&' + search.slice(1) : '')
      );
    </script>
  </head>
  <body>Redirecting…</body>
</html>
