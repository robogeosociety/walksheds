# Synonyms / typos / romanization variants → canonical tag.
#
# Single source of truth, consumed at two stages:
#   1. OSM ingestion (fetch_pois._canonicalize) — collapses raw OSM values
#      (e.g. cuisine=boba) into canonical tags before the manifest is built.
#   2. Frontend URL / search-box resolution — filter_schema.aliases in
#      public/pois/tag-categories.json carries this map (filtered to entries
#      whose canonical survived) so ?pois=dispensary and typing "disp" in
#      the search box both resolve to the canonical tag.
#
# Keys must be in lowercase-hyphen form (post-_normalize: lowercased,
# diacritics folded, spaces/underscores → hyphens). Set normalize=False on
# extraction to skip ingestion-time alias resolution.
#
# Authoring rules of thumb:
#   - Only add an alias when substring matching would NOT already cover it.
#     The search box's substring path (POISearch.jsx) means `taco` already
#     hits canonical `tacos`; an alias entry would be dead weight.
#   - Plural-typed → singular-canonical needs an alias (e.g. burgers → burger),
#     but singular-typed → plural-canonical works via substring for free.
#   - Hyphenated canonicals like `drive-through` are NOT a substring of
#     `drive-thru`, so add the colloquial form explicitly.

[aliases]
# Singular ↔ plural — keep the dominant variant
noodle = "noodles"
dumpling = "dumplings"
cookie = "cookies"
gyro = "gyros"
chicken-wings = "wings"

# Plural-typed query → singular canonical (the asymmetric direction)
