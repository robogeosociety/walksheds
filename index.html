<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Walksheds" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <meta name="description" content="See what's a 15-minute walk from every Seattle Link Light Rail station." />
    <!-- Open Graph / Twitter — rich link unfurling (Slack, iMessage, Discord, etc.).
         Slackbot does not run JS, so these live in the static HTML. Absolute URLs
         are required for og:image. The card is generated by
         data/icons/fetch_og_card.py from Westlake's real walkshed. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Walksheds" />
    <meta property="og:title" content="Walksheds — Seattle Link Light Rail walkshed explorer" />
    <meta property="og:description" content="See what's a 15-minute walk from every Seattle Link Light Rail station." />
    <meta property="og:url" content="https://walksheds.xyz/" />
    <meta property="og:image" content="https://walksheds.xyz/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Westlake Station's 5-, 10-, and 15-minute walksheds on the Walksheds map." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Walksheds — Seattle Link Light Rail walkshed explorer" />
    <meta name="twitter:description" content="See what's a 15-minute walk from every Seattle Link Light Rail station." />
    <meta name="twitter:image" content="https://walksheds.xyz/og-image.png" />
    <meta name="twitter:image:alt" content="Westlake Station's 5-, 10-, and 15-minute walksheds on the Walksheds map." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet" />
    <title>Walksheds — Transit Walkshed Navigator</title>
  </head>
  <body>
    <script>
      // Restore SPA path from 404.html redirect (GitHub Pages)
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var rest = window.location.search.replace(/[?&]p=[^&]+/, '').replace(/^&/, '?');
          window.history.replaceState(null, '', p + rest);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
